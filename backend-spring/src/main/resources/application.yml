server:
  port: 8080

spring:
  application:
    name: luxury-jung-api
  
  datasource:
    # 로컬 환경 기본값 포함 - 운영 시 환경변수로 오버라이드
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:33306/luxury_jung?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # 외부 SQL 파일을 통해 이미 관리하므로 validate로 안전하게 설정
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
        highlight_sql: true

# JWT 및 에이전트 설정 (환경변수로 외부 주입 권장)
app:
  jwt:
    secret: ${JWT_SECRET:aW1hZ2luYXRpb25pc21vcmVpbXBvcnRhbnR0aGFua25vd2xlZGdlYWxiZXJ0ZWluc3RlaW4=}
  agent:
    url: ${AGENT_SERVER_URL:http://localhost:8000}

# 로깅 설정
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.luxury.jung: debug
